<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Happy Monthsary</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: #000;
      color: #000;
    }
    .page {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
      background-image: url(29258e66-e69b-496e-a1e8-3dd4295c2a2f.jpg); /* 👈 change this */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }
    .card {
      background: rgba(10, 0, 150, 0.82);
      color: #fff;
      width: 100%;
      max-width: 640px;
      padding: 28px 32px;
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
      line-height: 1.6;
      text-align: center;
    }
    .card a { color: #7dd3fc; text-decoration: none; }
    .card a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>Welcome</h1>
      <p>HAPPY 5TH MONTHSARY BABE!</p>
      <p><a href="https://www.youtube.com">CLICK THIS PLEASEEE</a></p>
    </section>
  </main>
</body>
</html>
